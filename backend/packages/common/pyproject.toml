[project]
name = "transvirex-common"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "sqlalchemy[asyncio]",
    "psycopg[binary]",
    "pydantic-settings",
    "pyjwt[crypto]",
    "redis",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/transvirex_common"]
