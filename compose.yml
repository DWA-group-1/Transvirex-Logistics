services:
  # ─── PostgreSQL - AuthDB ────────────────────────────────────────────────────────────
  auth_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: authentication
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d authentication"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth:
    build: ./backend/services/auth
    environment:
      DATABASE_URL: postgresql+psycopg://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth_db:5432/authentication
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth_db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend/services/auth/:/app:Z
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.vite
      - /app/dist
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - VITE_DEV_SERVER_PORT=5173
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: npm run dev -- --host 0.0.0.0

volumes:
  auth_pgdata:

