services:
  # ─── Gateway ────────────────────────────────────────────────────────────────────────
  gateway:
    build: ./backend/gateway
    container_name: transvirex-gateway
    environment:
      GATEWAY_AUTH_URL: http://auth:8000
      GATEWAY_NOTIF_URL: http://notification:8000
      GATEWAY_CATALOG_URL: http://catalog:8000
      GATEWAY_DELIVERY_URL: http://delivery:8000
      GATEWAY_JWT_ALGORITHM: ${JWT_ALGORITHM}
      GATEWAY_CORS_ORIGINS: '["http://localhost:5173","http://localhost:4173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./keys:/run/secrets/keys:ro,z
    depends_on:
      auth:
        condition: service_healthy
      notification:
        condition: service_healthy
      catalog:
        condition: service_healthy
      delivery:
        condition: service_healthy

  # ─── Redis ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: transvirex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── PostgreSQL - AuthDB ────────────────────────────────────────────────────────────
  auth_db:
    image: postgres:17-alpine
    container_name: transvirex-auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: authentication
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d authentication"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    container_name: transvirex-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth_db:5432/authentication
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    depends_on:
      auth_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend/services/auth/:/workspace/services/auth:Z
      - ./backend/packages/common/:/workspace/packages/common:Z
      - ./keys:/run/secrets/keys:ro,z
    command:
      [
        uvicorn,
        app.main:app,
        --host,
        0.0.0.0,
        --port,
        "8000",
        --reload,
        --reload-dir,
        /workspace/services/auth/app,
        --reload-dir,
        /workspace/packages/common/src,
      ]

  # ─── PostgreSQL - NotificationDB ──────────────────────────────────────────
  notification_db:
    image: postgres:17-alpine
    container_name: transvirex-notif-db
    environment:
      POSTGRES_USER: ${NOTIF_DB_USER}
      POSTGRES_PASSWORD: ${NOTIF_DB_PASSWORD}
      POSTGRES_DB: notifications
    volumes:
      - notif_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIF_DB_USER} -d notifications"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Notification Service ─────────────────────────────────────────────────
  notification:
    build:
      context: ./backend
      dockerfile: services/notification/Dockerfile
    container_name: transvirex-notif
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${NOTIF_DB_USER}:${NOTIF_DB_PASSWORD}@notification_db:5432/notifications
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      REDIS_URL: "redis://redis:6379"
    depends_on:
      notification_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend/services/notification/:/app:Z
      - ./keys:/run/secrets/keys:ro,z
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "app",
      ]

  # ─── PostgreSQL - CatalogDB ──────────────────────────────────────────
  catalog_db:
    image: postgres:17-alpine
    container_name: transvirex-catalog-db
    environment:
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
      POSTGRES_DB: catalog
    volumes:
      - catalog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Catalog Service ─────────────────────────────────────────────────
  catalog:
    build:
      context: ./backend
      dockerfile: services/catalog/Dockerfile
    container_name: transvirex-catalog
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${CATALOG_DB_USER}:${CATALOG_DB_PASSWORD}@catalog_db:5432/catalog
      REDIS_URL: "redis://redis:6379"
      AUTH_INTERNAL_URL: "http://auth:8000"
    depends_on:
      catalog_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend/services/catalog/:/app:Z
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "app",
      ]

  # ─── PostgreSQL - DeliveryDB ─────────────────────────────────────────────────
  delivery_db:
    image: postgres:17-alpine
    container_name: transvirex-delivery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DELIVERY_DB_USER}
      POSTGRES_PASSWORD: ${DELIVERY_DB_PASSWORD}
      POSTGRES_DB: delivery
    volumes:
      - delivery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DELIVERY_DB_USER} -d delivery"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Delivery Service ─────────────────────────────────────────────────
  delivery:
    build:
      context: ./backend
      dockerfile: services/delivery/Dockerfile
    container_name: transvirex-delivery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${DELIVERY_DB_USER}:${DELIVERY_DB_PASSWORD}@delivery_db:5432/delivery
      REDIS_URL: "redis://redis:6379"
      CATALOG_INTERNAL_URL: "http://catalog:8000"
    depends_on:
      delivery_db: { condition: service_healthy }
      redis: { condition: service_healthy }
      catalog: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend/services/delivery/:/app:Z
    command:
      [
        uvicorn,
        app.main:app,
        --host,
        0.0.0.0,
        --port,
        "8000",
        --reload,
        --reload-dir,
        app,
      ]

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.vite
      - /app/dist
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - VITE_DEV_SERVER_PORT=5173
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: npm run dev -- --host 0.0.0.0

volumes:
  auth_pgdata:
  notif_pgdata:
  catalog_pgdata:
  delivery_pgdata:
