services:
  # ─── PostgreSQL - AuthDB ────────────────────────────────────────────────────────────
  auth_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: authentication
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d authentication"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth:
    build: ./backend/services/auth
    environment:
      DATABASE_URL: postgresql+psycopg://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth_db:5432/authentication
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth_db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend/services/auth/:/app:Z
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    # 🔥 ADD THESE FOR LIVE RELOADING 🔥
    volumes:
      - ./frontend:/app                    # Sync local frontend code to container
      - /app/node_modules                  # Preserve container's node_modules (don't sync)
      - /app/.vite                         # Preserve Vite cache (if using Vite)
      - /app/dist                          # Preserve build output (if any)
    environment:
      - CHOKIDAR_USEPOLLING=true           # Enable file polling for Docker
      - WATCHPACK_POLLING=true             # For webpack-based setups
      - VITE_DEV_SERVER_HOST=0.0.0.0       # Bind to all interfaces (for Vite)
      - VITE_DEV_SERVER_PORT=5173          # Explicit port for Vite
      - NODE_ENV=development               # Run in development mode
    stdin_open: true                       # Keep stdin open for React/Vite
    tty: true                              # Allocate a pseudo-TTY
    command: npm run dev -- --host 0.0.0.0 # Ensure Vite accepts external connections

volumes:
  auth_pgdata: